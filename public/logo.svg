<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CarsTrack">
  <defs>
    <!-- Badge background gradient: indigo → teal -->
    <linearGradient id="ct-bg" x1="48" y1="32" x2="464" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.45" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#15b8c5"/>
    </linearGradient>
    <!-- Soft top highlight -->
    <radialGradient id="ct-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(150 110) rotate(58) scale(360)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- White elements gradient (subtle) -->
    <linearGradient id="ct-white" x1="256" y1="120" x2="256" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6ebff"/>
    </linearGradient>
    <radialGradient id="ct-node" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(351 143) scale(46)">
      <stop offset="0" stop-color="#bbf7d0"/>
      <stop offset="0.55" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#22c55e"/>
    </radialGradient>
    <filter id="ct-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0b1220" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#ct-bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#ct-glow)"/>
  <rect x="16.75" y="16.75" width="478.5" height="478.5" rx="115.25" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>

  <g filter="url(#ct-shadow)">
    <!-- Open gauge ring (gap at bottom) -->
    <circle cx="256" cy="256" r="148" fill="none" stroke="url(#ct-white)" stroke-width="40"
      stroke-linecap="round" stroke-dasharray="749 181" transform="rotate(125 256 256)"/>

    <!-- Location pin (tracking) -->
    <path d="M256 356
             C 230 322 172 308 172 244
             A 84 84 0 1 1 340 244
             C 340 308 282 322 256 356 Z"
          fill="url(#ct-white)"/>
    <circle cx="256" cy="240" r="34" fill="url(#ct-bg)"/>

    <!-- Live tracking node on the ring -->
    <circle cx="351" cy="143" r="34" fill="#22c55e" opacity="0.28"/>
    <circle cx="351" cy="143" r="21" fill="url(#ct-node)"/>
    <circle cx="351" cy="143" r="7" fill="#ffffff"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#0d1f35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#38bdf8" stroke-width="1">
    <line x1="0" y1="160" x2="640" y2="160"/>
    <line x1="0" y1="320" x2="640" y2="320"/>
    <line x1="0" y1="480" x2="640" y2="480"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
  </g>

  <!-- Glow circle behind icon -->
  <circle cx="320" cy="262" r="130" fill="url(#accentGlow)" filter="url(#softglow)"/>

  <!-- Car body -->
  <g filter="url(#glow)" transform="translate(320,255)">
    <!-- Car main body -->
    <rect x="-118" y="18" width="236" height="72" rx="14" fill="url(#accent)"/>
    <!-- Cabin roof -->
    <path d="M -70 18 L -38 -40 Q -28 -56 -12 -56 L 62 -56 Q 76 -56 86 -40 L 110 18 Z" fill="url(#accent)"/>
    <!-- Windshield cutout -->
    <path d="M -58 14 L -32 -38 Q -24 -50 -12 -50 L 58 -50 Q 68 -50 76 -38 L 96 14 Z" fill="#0d1f35" opacity="0.6"/>
    <!-- Windshield shine -->
    <path d="M -42 8 L -22 -32 Q -16 -42 -8 -42 L 30 -42" stroke="#7dd3fc" stroke-width="2.5" fill="none" opacity="0.5"/>

    <!-- Left wheel arch -->
    <ellipse cx="-72" cy="90" rx="34" ry="18" fill="#0d1f35"/>
    <!-- Right wheel arch -->
    <ellipse cx="72" cy="90" rx="34" ry="18" fill="#0d1f35"/>

    <!-- Left wheel -->
    <circle cx="-72" cy="90" r="30" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="-72" cy="90" r="14" fill="#0f172a" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="-72" cy="90" r="4" fill="#38bdf8"/>
    <!-- Left wheel spokes -->
    <line x1="-72" y1="76" x2="-72" y2="90" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>
    <line x1="-72" y1="90" x2="-72" y2="104" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>
    <line x1="-86" y1="90" x2="-72" y2="90" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>
    <line x1="-72" y1="90" x2="-58" y2="90" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>

    <!-- Right wheel -->
    <circle cx="72" cy="90" r="30" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="72" cy="90" r="14" fill="#0f172a" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="72" cy="90" r="4" fill="#38bdf8"/>
    <!-- Right wheel spokes -->
    <line x1="72" y1="76" x2="72" y2="90" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>
    <line x1="72" y1="90" x2="72" y2="104" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>
    <line x1="58" y1="90" x2="72" y2="90" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>
    <line x1="72" y1="90" x2="86" y2="90" stroke="#38bdf8" stroke-width="2" opacity="0.7"/>

    <!-- Headlight left -->
    <rect x="-116" y="30" width="28" height="14" rx="5" fill="#7dd3fc" opacity="0.9"/>
    <!-- Headlight right -->
    <rect x="88" y="30" width="28" height="14" rx="5" fill="#f59e0b" opacity="0.8"/>

    <!-- Checkmark badge (top right of car) -->
    <circle cx="100" cy="-52" r="28" fill="#0ea5e9" stroke="#0d1f35" stroke-width="3"/>
    <polyline points="88,-52 97,-42 115,-62" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Divider line -->
  <rect x="160" y="410" width="320" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- "CarsTrack" text -->
  <text x="320" y="468"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="56"
    font-weight="700"
    letter-spacing="2"
    text-anchor="middle"
    fill="#f0f9ff"><tspan fill="#f0f9ff">Cars</tspan><tspan fill="#38bdf8">Track</tspan></text>

  <!-- Tagline -->
  <text x="320" y="510"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#7dd3fc"
    opacity="0.7">FILO YÖNETİM SİSTEMİ</text>
</svg>
